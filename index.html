<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="main container">
        <div class="left container">
            <div class="hero">
                <img src="images/odin-lined.png" alt="odin-lined">
                <h1>Odin</h1>
            </div>

            <p class="image credit">Photo by
                <a href="https://unsplash.com/@haliewestphoto">Halie West</a> on <a
                    href="https://unsplash.com/">Unsplash</a>
            </p>

        </div>
        <div class="right container">

            <div class="top container">
                <p class="hero-text">This is not a real online service! You know you need something like this in your
                    life to help you
                    realize your deepest dreams.</p>

                <p class="hero-text">Sign up <i>now</i> to get started</p>

                <p class="hero-text" style="margin: 1.5em 0px;">You <i>know</i> you want to.</p>

            </div>
            <div class="mid container" style="padding-bottom: 40px;">
                <h2>Let's do this!</h2>

                <form action="" class="form-master">
                    <div class="form-column">
                        <label for="user-first-name" name="first-name">First Name</label>
                        <input type="text" id="user-first-name">

                        <label for="user-email" name="email">Email</label>
                        <input type="text" id="user-email">

                        <label for="user-password" name="password">Password</label>
                        <input type="password" id="user-password">
                    </div>

                    <div class="form-column">
                        <label for="user-last-name" name="last-name">Last Name</label>
                        <input type="text" id="user-last-name">

                        <label for="user-phone" name="phone-number">Phone Number</label>
                        <input type="tel" id="user-phone">

                        <label for="confirm-password" name="confirm-password">Confirm Password</label>
                        <input type="password" id="confirm-password">
                    </div>

                    <div class="form-column">
                        x
                    </div>
                </form>
            </div>
            <div class="bot not-flex-container">

                <button>Create Account</button>

                <p>Already have an account? <a href="" class="login-text">Log In</a></p>
            </div>
        </div>
    </div>
</body>

</html>
